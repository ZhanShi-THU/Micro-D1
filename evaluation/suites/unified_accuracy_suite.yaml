suite_name: "unified_accuracy_suite"
output_root: "./eval_outputs/unified_accuracy_suite"
manifest: "/data1/staging_datasets/unified_vqa/manifests/merged/test.jsonl"
device: "cuda"
max_new_tokens: 32

baseline:
  enabled: true
  name: "baseline_qwen3_vl"
  model_path: "/home/user/Project_files/project/local_models/qwen3-vl-8b"
  prompt_style: "answer_only"
  max_new_tokens: 96

runs:
  - name: "phase2b_vqa"
    enabled: false
    config: "configs/phase2_qwen3_dinov3.yaml"
    checkpoint: "/path/to/phase2_vqa_best.pt"
    prompt_style: "answer_only"
    image_preprocessing: "pad_preserve"
    image_size: 448
    max_text_length: 192

  - name: "phase3_final"
    enabled: false
    config: "configs/phase3_qwen3_dinov3.yaml"
    checkpoint: "/path/to/phase3_best_accuracy.pt"
    prompt_style: "reasoning"
    image_preprocessing: "pad_preserve"
    image_size: 448
    max_text_length: 512
