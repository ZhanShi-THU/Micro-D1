suite_name: "microvqa_gold_detailed"
output_root: "./eval_outputs/microvqa_gold_detailed"
manifest: "/data1/staging_datasets/unified_vqa/manifests/by_split/microvqa_test.jsonl"
device: "cuda"
max_new_tokens: 500

task_alias_map:
  perception: "EU"
  hypothesis_gen: "HG"
  experiment_proposal: "EP"

baseline:
  enabled: false
  name: "baseline_qwen3_vl"
  model_path: "/home/user/Project_files/project/local_models/qwen3-vl-8b"
  prompt_style: "answer_only"
  max_new_tokens: 96

runs:
  - name: "phase1_adapter_warmup"
    enabled: false
    config: "configs/pretrain_llava.yaml"
    checkpoint: "/path/to/phase1_adapter_checkpoint.pt"
    prompt_style: "answer_only"
    image_preprocessing: "pad_preserve"
    image_size: 448
    max_text_length: 512

  - name: "phase2a_instruct"
    enabled: false
    config: "configs/phase2_qwen3_dinov3.yaml"
    checkpoint: "/home/user/Project_files/project/outputs/phase2_qwen3_dinov3_qwen_hybrid_lora128/qwen3_dinov3_phase2_mixed_qwen_hybrid_lora128_mixed_20260402_044049/phase2_mixed_step_900.pt"
    prompt_style: "answer_only"
    image_preprocessing: "pad_preserve"
    image_size: 448
    max_text_length: 512

  - name: "phase2_mixed_qwen_hybrid_lora128"
    enabled: false
    config: "configs/phase2_qwen3_dinov3_qwen_hybrid_lora128.yaml"
    checkpoint: "/home/user/Project_files/project/outputs/phase2_qwen3_dinov3_qwen_hybrid_lora128/qwen3_dinov3_phase2_mixed_qwen_hybrid_lora128_mixed_20260401_220905/phase2_mixed_best.pt"
    prompt_style: "reasoning"
    image_preprocessing: "qwen_hybrid"
    dynamic_buckets: [384, 448, 512]
    patch_size: 16
    image_size: 448
    max_text_length: 384


  - name: "phase3_final"
    enabled: true
    config: "configs/phase3_qwen3_dinov3_qwen_hybrid_lora128.yaml"
    checkpoint: "/home/user/Project_files/project/outputs/phase3_qwen3_dinov3_qwen_hybrid_lora128/qwen3_dinov3_phase3_reasoning_qwen_hybrid_lora128_conservative_20260402_123905/phase3_best_loss.pt"
    prompt_style: "reasoning"
    image_preprocessing: "qwen_hybrid"
    dynamic_buckets: [384, 448, 512]
    patch_size: 16
    image_size: 448
    max_text_length: 512
